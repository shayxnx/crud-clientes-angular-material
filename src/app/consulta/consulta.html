<div class="form-div">
    <form class="mt-20" #buscaForm="ngForm" (ngSubmit)="pesquisar()">
        <mat-card appearance="outlined">
            <mat-card-header>
                <mat-card-title>Consulta de Clientes</mat-card-title>
            </mat-card-header>
            <mat-card-content class="mt-20">
                <div>
                    <mat-form-field class="full-width">
                        <mat-label>Nome:</mat-label>
                        <input name="nomeBusca" [(ngModel)]="nomeBusca" type="text" name="nome" placeholder="ex: Maria" matInput>
                    </mat-form-field>
                </div>
            </mat-card-content>
           <mat-card-actions>
            <button matButton="elevated">
                <mat-icon>search</mat-icon>
                Buscar
            </button>
           </mat-card-actions>
        </mat-card>
    </form>
</div>

<div class="table-div">
    <mat-card appearance="outlined">
         <mat-card-header>

                <mat-card-title>Resultado</mat-card-title>
            </mat-card-header>
             <mat-card-content class="mt-20">
                <table mat-table [dataSource]="listaClientes" class="full-width consulta-table">
                    
                    <ng-container matColumnDef="id">
                        <th mat-header-cell *matHeaderCellDef> ID </th>
                        <td mat-cell *matCellDef="let cliente"> {{cliente.id}} </td>
                    </ng-container>

                    <ng-container matColumnDef="nome">
                        <th mat-header-cell *matHeaderCellDef> Nome </th>
                        <td mat-cell *matCellDef="let cliente"> {{cliente.nome}} </td>
                    </ng-container>

                    <ng-container matColumnDef="cpf">
                        <th mat-header-cell *matHeaderCellDef> CPF </th>
                        <td mat-cell *matCellDef="let cliente"> {{cliente.cpf}} </td>
                    </ng-container>

                    <ng-container matColumnDef="email">
                        <th mat-header-cell *matHeaderCellDef> Email </th>
                        <td mat-cell *matCellDef="let cliente"> {{cliente.email}} </td>
                    </ng-container>

                    <ng-container matColumnDef="dataNascimento">
                        <th mat-header-cell *matHeaderCellDef> Data de Nascimento </th>
                        <td mat-cell *matCellDef="let cliente"> {{cliente.dataNascimento}} </td>
                    </ng-container>
                    

                    <ng-container matColumnDef="acoes">
                        <th mat-header-cell *matHeaderCellDef></th>
                        <td mat-cell *matCellDef="let cliente">
                            <div class="acoes-buttons">
                                <button type="button" matMiniFab="editar" (click)="preparaEditar(cliente.id)">
                                    <mat-icon>edit</mat-icon>
                                </button>

                                @if(!cliente.deletando){
                                <button type="button" matMiniFab="excluir" (click)="preparaDeletar(cliente)">
                                    <mat-icon>delete</mat-icon>
                                </button>
                                } @else {
                                    <button type="button" mat-button (click)="deletar(cliente)">
                                        <mat-icon>question_mark</mat-icon>
                                        confirma
                                    </button>
                                
                                    <button type="button" matButton (click)="cancelarDeletar(cliente)">
                                        <mat-icon>close</mat-icon>
                                
                                    </button>
                                }
                            </div>
                        </td>
                    </ng-container>
                    


                    <tr mat-header-row *matHeaderRowDef="colunasTable"></tr>
                    <tr mat-row *matRowDef = "let row; columns:colunasTable;" ></tr>
                </table>
                </mat-card-content>
                </mat-card>           
</div>
